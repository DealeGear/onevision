<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OneVision Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100">
  
  <!-- Layout Principal -->
  <div class="flex h-screen">

    <!-- Painel Lateral -->
    <aside class="w-64 bg-white dark:bg-gray-800 shadow-lg">
      <div class="p-5 text-xl font-bold text-blue-600 dark:text-blue-400">📊 OneVision</div>
      <nav class="mt-5">
        <a href="#" class="block p-3 hover:bg-blue-500 hover:text-white">📈 Gráficos</a>
        <a href="#" class="block p-3 hover:bg-blue-500 hover:text-white">📋 Tabelas</a>
        <a href="#" class="block p-3 hover:bg-blue-500 hover:text-white">⚙ Configurações</a>
      </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="flex-1 p-6">
      <div class="flex justify-between">
        <h1 class="text-2xl font-semibold">Dashboard Econômico</h1>
        <button id="toggleTheme" class="px-4 py-2 bg-blue-500 text-white rounded">🌙 Modo Escuro</button>
      </div>

      <!-- Grid de Gráficos -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">

        <!-- Câmbio -->
        <div class="bg-white dark:bg-gray-800 p-5 shadow-md rounded">
          <h2 class="text-lg font-semibold">Câmbio: USD vs Outras Moedas</h2>
          <canvas id="exchangeChart"></canvas>
        </div>

        <!-- Commodities -->
        <div class="bg-white dark:bg-gray-800 p-5 shadow-md rounded">
          <h2 class="text-lg font-semibold">Preços de Commodities</h2>
          <canvas id="commoditiesChart"></canvas>
        </div>

        <!-- Temperatura Global -->
        <div class="bg-white dark:bg-gray-800 p-5 shadow-md rounded col-span-1 md:col-span-2">
          <h2 class="text-lg font-semibold">Temperatura Média Global</h2>
          <canvas id="tempChart"></canvas>
        </div>

      </div>

    </main>
  </div>

  <!-- JavaScript -->
  <script>
    // Modo escuro/claro
    document.getElementById("toggleTheme").addEventListener("click", () => {
      document.body.classList.toggle("dark");
    });

    // Criando gráficos com Chart.js
    const ctx1 = document.getElementById("exchangeChart").getContext("2d");
    const ctx2 = document.getElementById("commoditiesChart").getContext("2d");
    const ctx3 = document.getElementById("tempChart").getContext("2d");

    // Simulação de dados (substituir por APIs)
    const exchangeData = {
      labels: ["EUR", "GBP", "JPY", "AUD", "CAD"],
      datasets: [{
        label: "USD vs Moedas",
        data: [1.08, 1.25, 134.5, 1.45, 1.32],
        backgroundColor: "rgba(75, 192, 192, 0.6)"
      }]
    };

    const commoditiesData = {
      labels: ["Ouro", "Petróleo", "Trigo", "Arroz"],
      datasets: [{
        label: "Preços ($)",
        data: [1980, 85, 5.2, 3.8],
        backgroundColor: ["gold", "black", "orange", "green"]
      }]
    };

    const tempData = {
      labels: ["2015", "2016", "2017", "2018", "2019", "2020"],
      datasets: [{
        label: "Temperatura Média (°C)",
        data: [14.7, 14.8, 14.9, 15.0, 15.1, 15.2],
        borderColor: "red",
        backgroundColor: "rgba(255, 99, 132, 0.2)",
        fill: true
      }]
    };

    new Chart(ctx1, { type: "bar", data: exchangeData });
    new Chart(ctx2, { type: "pie", data: commoditiesData });
    new Chart(ctx3, { type: "line", data: tempData });

  </script>
</body>
</html>
